name: Daily Run

on:
  # main 브랜치에 코드가 푸시될 때 실행되는 트리거
  # push:
  #   branches: [ "main" ]

  # pull request 생성 될 때 실행되는 트리거
  # pull_request:
  #   branches: [ "main" ]

  # 수동 실행 트리거
  workflow_dispatch:

  # 정기 실행 트리거
  # schedule:
    # 한국 시간(KST) 15시 == UTC 06:00
    # 매일 UTC 06시 00분에 실행되도록 설정
    # - cron: '0 6 * * *' 
    
permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1 
          
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            
    - name: Run Python script (main.py)
      env:
        NAVER_ID: ${{ secrets.NAVER_ID }}
        NAVER_PW: ${{ secrets.NAVER_PW }}
      run: python main.py
        
      # 💡 에러 발생 여부와 상관없이 스크린샷 파일이 있으면 업로드
    - name: Upload Debug Screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: "*.png"
