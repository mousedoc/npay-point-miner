name: Daily Run

on:
  # main 브랜치에 코드가 푸시될 때 실행되는 트리거
  # push:
  #   branches: [ "main" ]

  # pull request 생성 될 때 실행되는 트리거
  # pull_request:
  #   branches: [ "main" ]

  # 수동 실행 트리거
  workflow_dispatch:

  # 정기 실행 트리거
  schedule:
    # 한국 시간(KST) 15시 == UTC 06:00
    # 매일 UTC 06시 00분에 실행되도록 설정
    - cron: '0 6 * * *' 
    
permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # 'archive' 폴더를 체크아웃에서 제외
        # .gitattributes 파일에 'archive export-ignore'를 추가하여도 되지만, 
        # fetch-depth와 sparse-checkout을 사용하여 용량이 큰 폴더를 제외하는 것이 더 확실합니다.
        # 주의: 이는 전체 리포지토리 히스토리가 아닌, 현재 커밋만 가져옵니다 (shallow clone).
        fetch-depth: 1 
        sparse-checkout-files: |
          !archive/**
          **
          
    - name: Set up Python 3.10
      # setup-python 액션의 최신 버전 (v5) 사용을 권장합니다.
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 린트 도구 (flake8)와 테스트 도구 (pytest)는 이제 필요하지 않을 수 있지만,
        # .py 파일 실행을 위해 필수 패키지만 남기고 삭제하거나 유지할 수 있습니다.
        # pip install flake8 pytest # 필요에 따라 주석 해제하거나 삭제하세요
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Python script (github_action.py)
      run: |
        # pytest 대신 python github_action.py 명령어를 실행합니다.
        python main.py

        
